# Cole DENTRO do server { listen 443 ... grupoalvim.com.br / www.grupoalvim.com.br }
# ANTES de "location /".
#
# Site institucional: https://www.grupoalvim.com.br/  → 127.0.0.1:3006
# FreeControl:        https://grupoalvim.com.br/freelancers  → 127.0.0.1:3004
#
# IMPORTANTE: não use "root" / "try_files" para servir arquivos estáticos do site
# na pasta do disco — o CSS responsivo (site-custom.css) vem do container Node.
# Todo tráfego do site (/, /assets/*, /sobre, /franqueado) deve passar pelo proxy abaixo.

location /freelancers {
    proxy_pass http://127.0.0.1:3004;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}

location /api {
    proxy_pass http://127.0.0.1:3004;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}

location /uploads {
    proxy_pass http://127.0.0.1:3004;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}

location / {
    proxy_pass http://127.0.0.1:3006;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}
