# Configuracao NGINX — uma vez so (nao repete a cada deploy)
#
# O arquivo grupoalvim.conf no servidor deve conter algo equivalente a isto.
# Depois de configurado, cada deploy so roda: bash deploy.sh
# O nginx continua apontando para localhost:3006 — nao precisa reload.

# Site institucional: www.grupoalvim.com.br -> 127.0.0.1:3006
# FreeControl:        /freelancers, /api, /uploads -> 127.0.0.1:3004

location /freelancers {
    proxy_pass http://127.0.0.1:3004;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}

location /api {
    proxy_pass http://127.0.0.1:3004;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}

